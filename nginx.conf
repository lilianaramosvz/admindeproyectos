server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== SPA routing =====
    # Cualquier path que no exista como archivo físico, devuelve index.html.
    # Indispensable para React Router — sin esto, /dashboard daría 404 si
    # alguien hace refresh o entra directo a esa URL.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== Cache agresivo para assets =====
    # Vite genera nombres con hash (e.g. main-A1B2C3.js). Cuando el contenido
    # cambia, el hash cambia, así que es seguro cachear por 1 año.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ===== Health endpoint para los K8s probes =====
    # Responde 200 OK sin servir el index.html (más eficiente).
    location = /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ===== Compresión gzip básica =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
